name: Tutorial Preview Demo

on:
  workflow_dispatch: {}

# Pinned FFmpeg static build for deterministic rendering.
# To upgrade: update FFMPEG_VERSION, FFMPEG_ARCHIVE, FFMPEG_URL, and FFMPEG_SHA256
# from https://github.com/BtbN/FFmpeg-Builds/releases
env:
  FFMPEG_VERSION: 'n7.1.4-39-ga5faeca88f'
  FFMPEG_ARCHIVE: 'ffmpeg-n7.1.4-39-ga5faeca88f-linux64-gpl-7.1.tar.xz'
  FFMPEG_URL: 'https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-15-15-03/ffmpeg-n7.1.4-39-ga5faeca88f-linux64-gpl-7.1.tar.xz'
  FFMPEG_SHA256: 'dff1b3ba8401bc3520435d879be73eb21d7f884e0a149bd7139392be955a4942'

jobs:
  generate-preview:
    name: Generate Tutorial Preview MP4 (${{ matrix.slug }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: gem-collectors
            fixture: tests/fixtures/tutorial-vertical-slice/gem-collectors.json
          - slug: hanamikoji
            fixture: tests/fixtures/tutorial-vertical-slice/hanamikoji.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache FFmpeg static binaries
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-linux64-gpl

      - name: Setup FFmpeg
        timeout-minutes: 5
        run: |
          echo "--- FFmpeg setup (pinned: $FFMPEG_VERSION) ---"

          # Priority 1: preinstalled on runner
          if command -v ffmpeg &>/dev/null && command -v ffprobe &>/dev/null; then
            echo "source=preinstalled"
            echo "  ffmpeg path: $(which ffmpeg)"
            echo "  ffprobe path: $(which ffprobe)"
          # Priority 2: cached binaries from previous run
          elif [ -x /opt/ffmpeg/ffmpeg ] && [ -x /opt/ffmpeg/ffprobe ]; then
            echo "source=cache"
            sudo ln -sf /opt/ffmpeg/ffmpeg /usr/local/bin/ffmpeg
            sudo ln -sf /opt/ffmpeg/ffprobe /usr/local/bin/ffprobe
          # Priority 3: fresh download of pinned static build
          else
            echo "source=pinned-download"
            echo "  Downloading $FFMPEG_ARCHIVE..."
            curl -fsSL "$FFMPEG_URL" -o /tmp/ffmpeg.tar.xz
            echo "  Verifying SHA-256..."
            echo "$FFMPEG_SHA256  /tmp/ffmpeg.tar.xz" | sha256sum -c -
            echo "  Extracting..."
            mkdir -p /tmp/ffmpeg-extract
            tar -xf /tmp/ffmpeg.tar.xz --strip-components=1 -C /tmp/ffmpeg-extract
            # Install to /opt/ffmpeg for caching
            sudo mkdir -p /opt/ffmpeg
            sudo cp /tmp/ffmpeg-extract/bin/ffmpeg /opt/ffmpeg/ffmpeg
            sudo cp /tmp/ffmpeg-extract/bin/ffprobe /opt/ffmpeg/ffprobe
            sudo chmod +x /opt/ffmpeg/ffmpeg /opt/ffmpeg/ffprobe
            # Symlink into PATH
            sudo ln -sf /opt/ffmpeg/ffmpeg /usr/local/bin/ffmpeg
            sudo ln -sf /opt/ffmpeg/ffprobe /usr/local/bin/ffprobe
            rm -rf /tmp/ffmpeg.tar.xz /tmp/ffmpeg-extract
          fi

          echo "--- FFmpeg diagnostics ---"
          echo "  ffmpeg path: $(which ffmpeg)"
          echo "  ffprobe path: $(which ffprobe)"
          ffmpeg -version | head -3
          ffprobe -version | head -1

      - name: Generate tutorial artifacts (dry-run)
        run: node scripts/generate-tutorial-preview.mjs --fixture "${{ matrix.fixture }}" --slug "${{ matrix.slug }}" --out "out/tutorial-preview/${{ matrix.slug }}"

      - name: Render MP4 preview
        run: |
          node scripts/render-storyboard-ffmpeg.mjs \
            --config "out/tutorial-preview/${{ matrix.slug }}/render-config.json" \
            --out "out/tutorial-preview/${{ matrix.slug }}/preview.mp4"

      - name: Verify preview.mp4 exists and is non-empty
        run: |
          if [ ! -s "out/tutorial-preview/${{ matrix.slug }}/preview.mp4" ]; then
            echo "ERROR: preview.mp4 is missing or empty" >&2
            exit 1
          fi
          echo "preview.mp4 size: $(stat -c%s "out/tutorial-preview/${{ matrix.slug }}/preview.mp4") bytes"

      - name: Capture media metadata
        run: |
          ffprobe -hide_banner -print_format json -show_format -show_streams \
            "out/tutorial-preview/${{ matrix.slug }}/preview.mp4" > "out/tutorial-preview/${{ matrix.slug }}/ffprobe.json"
          echo "### Tutorial Preview Media Info" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "out/tutorial-preview/${{ matrix.slug }}/ffprobe.json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          summary = {
            'duration': data.get('format', {}).get('duration'),
            'size_bytes': data.get('format', {}).get('size'),
            'streams': [{'type': s.get('codec_type'), 'codec': s.get('codec_name'), 'resolution': f\"{s.get('width')}x{s.get('height')}\" if s.get('width') else None} for s in data.get('streams', [])]
          }
          json.dump(summary, sys.stdout, indent=2)
          " >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Validate artifact contract
        run: npm run validate:tutorial-preview-artifact -- --dir "out/tutorial-preview/${{ matrix.slug }}"

      - name: Generate visual QA contact sheet
        run: npm run generate:tutorial-preview-contact-sheet -- --video "out/tutorial-preview/${{ matrix.slug }}/preview.mp4" --out-dir "out/tutorial-preview/${{ matrix.slug }}/visual-qa" --frames 8

      - name: Validate visual QA contract
        run: npm run validate:tutorial-preview-visual-qa -- --dir "out/tutorial-preview/${{ matrix.slug }}/visual-qa"

      # TEMPORARY PR-BRANCH CAPTURE ONLY — restore golden gates before merge
      - name: Score tutorial quality (advisory)
        run: npm run score:tutorial-preview-quality -- --dir "out/tutorial-preview/${{ matrix.slug }}" --out "out/tutorial-preview/${{ matrix.slug }}/quality-report.json"

      - name: Upload tutorial preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobius-tutorial-preview-${{ matrix.slug }}
          path: |
            out/tutorial-preview/${{ matrix.slug }}/preview.mp4
            out/tutorial-preview/${{ matrix.slug }}/script.json
            out/tutorial-preview/${{ matrix.slug }}/storyboard.json
            out/tutorial-preview/${{ matrix.slug }}/captions.srt
            out/tutorial-preview/${{ matrix.slug }}/render-config.json
            out/tutorial-preview/${{ matrix.slug }}/manifest.json
            out/tutorial-preview/${{ matrix.slug }}/ffprobe.json
            out/tutorial-preview/${{ matrix.slug }}/quality-report.json
            out/tutorial-preview/${{ matrix.slug }}/visual-qa/contact-sheet.jpg
            out/tutorial-preview/${{ matrix.slug }}/visual-qa/visual-qa-manifest.json
            out/tutorial-preview/${{ matrix.slug }}/visual-qa/frames/
          if-no-files-found: error
          retention-days: 30

      - name: Validate golden metadata baseline
        run: npm run validate:tutorial-preview-golden-baseline -- --dir "out/tutorial-preview/${{ matrix.slug }}" --baseline "tests/golden/tutorial-preview/${{ matrix.slug }}-baseline.json"

      - name: Validate golden frame fingerprints
        run: npm run validate:tutorial-preview-frame-fingerprints -- --dir "out/tutorial-preview/${{ matrix.slug }}" --baseline "tests/golden/tutorial-preview/${{ matrix.slug }}-frame-fingerprints.json"

      - name: Validate golden MP4 fingerprint
        run: npm run validate:tutorial-preview-mp4-fingerprint -- --dir "out/tutorial-preview/${{ matrix.slug }}" --baseline "tests/golden/tutorial-preview/${{ matrix.slug }}-mp4-fingerprint.json"

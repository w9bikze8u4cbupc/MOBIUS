name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-qa:
    needs:
      - phase-e-governance
      - subtitle-governance
      - audio-mixing-governance
      - motion-governance
      - g3-visualization-governance
      - g5-cross-tutorial-analytics-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: client

      - name: Install root deps
        run: npm ci

      - name: Cache FFmpeg static binaries (Linux)
        if: runner.os == 'Linux'
        id: ffmpeg-cache-linux
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-n7.1.4-39-ga5faeca88f-linux64-gpl

      - name: Ensure FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "--- FFmpeg setup (pinned BtbN static) ---"
          FFMPEG_VERSION="n7.1.4-39-ga5faeca88f"
          FFMPEG_URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-15-15-03/ffmpeg-n7.1.4-39-ga5faeca88f-linux64-gpl-7.1.tar.xz"
          FFMPEG_SHA256="dff1b3ba8401bc3520435d879be73eb21d7f884e0a149bd7139392be955a4942"

          # Priority 1: preinstalled on runner
          if command -v ffmpeg &>/dev/null && command -v ffprobe &>/dev/null; then
            echo "source=preinstalled"
            echo "  ffmpeg path: $(which ffmpeg)"
            echo "  ffprobe path: $(which ffprobe)"
          # Priority 2: cached binaries from previous run
          elif [ -x /opt/ffmpeg/ffmpeg ] && [ -x /opt/ffmpeg/ffprobe ]; then
            echo "source=cache"
            sudo ln -sf /opt/ffmpeg/ffmpeg /usr/local/bin/ffmpeg
            sudo ln -sf /opt/ffmpeg/ffprobe /usr/local/bin/ffprobe
          # Priority 3: fresh download of pinned static build
          else
            echo "source=pinned-download"
            echo "  Downloading $FFMPEG_VERSION..."
            curl -fsSL "$FFMPEG_URL" -o /tmp/ffmpeg.tar.xz
            echo "  Verifying SHA-256..."
            echo "$FFMPEG_SHA256  /tmp/ffmpeg.tar.xz" | sha256sum -c -
            echo "  Extracting..."
            mkdir -p /tmp/ffmpeg-extract
            tar -xf /tmp/ffmpeg.tar.xz --strip-components=1 -C /tmp/ffmpeg-extract
            sudo mkdir -p /opt/ffmpeg
            sudo cp /tmp/ffmpeg-extract/bin/ffmpeg /opt/ffmpeg/ffmpeg
            sudo cp /tmp/ffmpeg-extract/bin/ffprobe /opt/ffmpeg/ffprobe
            sudo chmod +x /opt/ffmpeg/ffmpeg /opt/ffmpeg/ffprobe
            sudo ln -sf /opt/ffmpeg/ffmpeg /usr/local/bin/ffmpeg
            sudo ln -sf /opt/ffmpeg/ffprobe /usr/local/bin/ffprobe
            rm -rf /tmp/ffmpeg.tar.xz /tmp/ffmpeg-extract
          fi

          echo "--- FFmpeg diagnostics ---"
          ffmpeg -version | head -3
          ffprobe -version | head -1
        shell: bash

      - name: Cache FFmpeg static binaries (Windows)
        if: runner.os == 'Windows'
        id: ffmpeg-cache-win
        uses: actions/cache@v4
        with:
          path: C:\ffmpeg
          key: ffmpeg-n7.1.4-39-ga5faeca88f-win64-gpl

      - name: Ensure FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "--- FFmpeg setup (Windows) ---"
          # Priority 1: already on PATH
          if (Get-Command ffmpeg -ErrorAction SilentlyContinue) {
            Write-Host "source=preinstalled"
            ffmpeg -version | Select-Object -First 1
          }
          # Priority 2: common runner locations
          elseif (Test-Path "C:\ProgramData\chocolatey\bin\ffmpeg.exe") {
            Write-Host "source=choco-path"
            echo "C:\ProgramData\chocolatey\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            & "C:\ProgramData\chocolatey\bin\ffmpeg.exe" -version | Select-Object -First 1
          }
          # Priority 3: cached binaries from previous run
          elseif (Test-Path "C:\ffmpeg\ffmpeg.exe") {
            Write-Host "source=cache"
            echo "C:\ffmpeg" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            & "C:\ffmpeg\ffmpeg.exe" -version | Select-Object -First 1
          }
          # Priority 4: install via choco (reliable when community feed is up)
          else {
            Write-Host "source=choco-install"
            choco install ffmpeg -y --no-progress --timeout=120
            if ($LASTEXITCODE -eq 0) {
              $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
              echo "C:\ProgramData\chocolatey\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            }
            # Verify
            if (Get-Command ffmpeg -ErrorAction SilentlyContinue) {
              ffmpeg -version | Select-Object -First 1
            } else {
              Write-Host "source=pinned-download-fallback"
              $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-15-15-03/ffmpeg-n7.1.4-39-ga5faeca88f-win64-gpl-7.1.zip"
              $zipPath = "$env:TEMP\ffmpeg.zip"
              $extractPath = "$env:TEMP\ffmpeg-extract"
              Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
              Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
              $binDir = (Get-ChildItem -Path $extractPath -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1).DirectoryName
              New-Item -ItemType Directory -Force -Path "C:\ffmpeg" | Out-Null
              Copy-Item "$binDir\*" -Destination "C:\ffmpeg\" -Recurse -Force
              echo "C:\ffmpeg" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
              Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
              Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
              & "C:\ffmpeg\ffmpeg.exe" -version | Select-Object -First 1
            }
          }
        shell: pwsh

      - name: Ensure FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build
        run: npm run build --if-present
        working-directory: client

      - name: Unit tests (root)
        run: npm test -- --ci --reporters=default
        working-directory: .

      - name: Elite ESM verifier tests
        run: npm run test:elite -- --ci --reporters=default --forceExit
        working-directory: .

      - name: Unit tests (client)
        run: npm test -- --ci --reporters=default --passWithNoTests
        working-directory: client
        continue-on-error: false

      - name: Real-input CLI smoke (sakura-market)
        run: |
          node scripts/run-real-input-preview.mjs --fixture sakura-market --out out/real-input-cli-smoke/sakura-market
        shell: bash

      - name: Verify CLI smoke output
        run: |
          echo "--- Verifying CLI smoke output ---"
          test -f out/real-input-cli-smoke/sakura-market/sakura-market-normalized.json
          test -f out/real-input-cli-smoke/sakura-market/script.json
          test -f out/real-input-cli-smoke/sakura-market/storyboard.json
          test -f out/real-input-cli-smoke/sakura-market/captions.srt
          test -f out/real-input-cli-smoke/sakura-market/render-config.json
          test -f out/real-input-cli-smoke/sakura-market/manifest.json
          test -f out/real-input-cli-smoke/sakura-market/preview.mp4
          test -f out/real-input-cli-smoke/sakura-market/ffprobe.json
          test -f out/real-input-cli-smoke/sakura-market/validation-result.json
          test -f out/real-input-cli-smoke/sakura-market/real-input-preview-coverage.json
          echo "All CLI smoke output files verified."
        shell: bash

      - name: Render preview
        run: |
          mkdir -p out artifacts
          npm run render --if-present
          if [ ! -f out/preview_with_audio.mp4 ]; then
            candidate="$(find . -maxdepth 2 -type f -name 'preview*.mp4' | head -n1)"
            if [ -n "$candidate" ]; then
              cp "$candidate" out/preview_with_audio.mp4
            fi
          fi
        shell: bash

      - name: Fallback preview (synthetic)
        if: ${{ !cancelled() }}
        run: |
          if [ ! -f out/preview_with_audio.mp4 ]; then
            mkdir -p out
            ffmpeg -hide_banner -loglevel error -f lavfi -i color=c=black:s=1280x720:d=6 \
                   -f lavfi -i sine=f=1000:d=6 -shortest \
                   -c:v libx264 -pix_fmt yuv420p -r 30 -c:a aac -b:a 128k out/preview_with_audio.mp4
          fi
        shell: bash

      - name: Verify audio stream present
        run: |
          ffprobe -hide_banner -loglevel error -select_streams a -show_entries stream=index -of csv=p=0 out/preview_with_audio.mp4 > artifacts/audio_streams.txt
          if [ ! -s artifacts/audio_streams.txt ]; then
            echo "No audio streams detected in out/preview_with_audio.mp4" >&2
            exit 1
          fi
        shell: bash

      - name: Audio ebur128
        run: |
          ffmpeg -hide_banner -nostats -i out/preview_with_audio.mp4 -filter_complex ebur128=peak=true -f null - 2> artifacts/preview_with_audio_ebur128.txt
        shell: bash

      - name: Capture media metadata
        run: |
          ffprobe -hide_banner -loglevel error -print_format json -show_format -show_streams out/preview_with_audio.mp4 > artifacts/preview_ffprobe.json
        shell: bash

      - name: Capture provenance (Unix)
        if: runner.os != 'Windows'
        run: |
          sha256sum out/preview_with_audio.mp4 > artifacts/preview_with_audio.sha256
        shell: bash

      - name: Capture provenance (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-FileHash -Algorithm SHA256 out/preview_with_audio.mp4 | Format-Table -HideTableHeaders > artifacts/preview_with_audio.sha256
        shell: pwsh

      - name: Audio gates (Unix)
        if: runner.os != 'Windows'
        run: |
          if ! grep -q 'I:' artifacts/preview_with_audio_ebur128.txt; then
            echo "Integrated loudness result was not found in EBUR128 output." >&2
            exit 1
          fi
          if ! grep -q 'True peak' artifacts/preview_with_audio_ebur128.txt; then
            echo "True-peak result was not found in EBUR128 output." >&2
            exit 1
          fi
        shell: bash

      - name: Audio gates (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not (Select-String -Path 'artifacts/preview_with_audio_ebur128.txt' -Pattern 'I:')) {
            Write-Error 'Integrated loudness result was not found in EBUR128 output.'
          }
          if (-not (Select-String -Path 'artifacts/preview_with_audio_ebur128.txt' -Pattern 'True peak')) {
            Write-Error 'True-peak result was not found in EBUR128 output.'
          }
        shell: pwsh

      - name: Extract EBUR128 metrics (Unix)
        if: runner.os != 'Windows'
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          metrics_path = pathlib.Path('artifacts/preview_audio_metrics.json')
          log_text = pathlib.Path('artifacts/preview_with_audio_ebur128.txt').read_text(encoding='utf-8')

          integrated = re.search(r'I:\s*(-?\d+(?:\.\d+)?)', log_text)
          true_peak = re.search(r'Peak:\s*(-?\d+(?:\.\d+)?)', log_text)

          if integrated and true_peak:
              payload = {
                  'integrated_lufs': float(integrated.group(1)),
                  'true_peak_dbfs': float(true_peak.group(1)),
              }
              metrics_path.write_text(json.dumps(payload, separators=(',', ':')), encoding='utf-8')
          PY
        shell: bash

      - name: Extract EBUR128 metrics (Windows)
        if: runner.os == 'Windows'
        run: |
          $logText = Get-Content 'artifacts/preview_with_audio_ebur128.txt' -Raw
          $integratedMatch = [regex]::Match($logText, 'I:\s*(-?\d+(?:\.\d+)?)')
          $truePeakMatch = [regex]::Match($logText, 'Peak:\s*(-?\d+(?:\.\d+)?)')
          if ($integratedMatch.Success -and $truePeakMatch.Success) {
            $payload = [ordered]@{
              integrated_lufs = [double]$integratedMatch.Groups[1].Value
              true_peak_dbfs = [double]$truePeakMatch.Groups[1].Value
            }
            $json = $payload | ConvertTo-Json -Compress
            Set-Content -Path 'artifacts/preview_audio_metrics.json' -Value $json -Encoding utf8
          }
        shell: pwsh

      - name: Validate audio metrics (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -f artifacts/preview_audio_metrics.json ]; then
            python -c "import json; d=json.load(open('artifacts/preview_audio_metrics.json')); assert {'integrated_lufs','true_peak_dbfs'} <= d.keys(), 'Missing expected audio metric keys'"
          fi
        shell: bash

      - name: Validate audio metrics (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path 'artifacts/preview_audio_metrics.json') {
            $json = Get-Content 'artifacts/preview_audio_metrics.json' -Raw | ConvertFrom-Json
            $hasIntegrated = $json.PSObject.Properties.Name -contains 'integrated_lufs'
            $hasTruePeak = $json.PSObject.Properties.Name -contains 'true_peak_dbfs'
            if (-not ($hasIntegrated -and $hasTruePeak)) {
              Write-Error 'Missing expected audio metric keys in artifacts/preview_audio_metrics.json.'
            }
          }
        shell: pwsh

      - name: Summarize audio metrics
        if: always() && runner.os != 'Windows'
        run: |
          echo '### Preview Audio Metrics' >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/preview_audio_metrics.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/preview_audio_metrics.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Metrics not generated in this run.' >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Summarize audio metrics (Windows)
        if: always() && runner.os == 'Windows'
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Preview Audio Metrics'
          if (Test-Path 'artifacts/preview_audio_metrics.json') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```json'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value (Get-Content 'artifacts/preview_audio_metrics.json' -Raw)
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }
          else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'Metrics not generated in this run.'
          }
        shell: pwsh

      - name: Container gates (Unix)
        if: runner.os != 'Windows'
        run: |
          test -s artifacts/preview_ffprobe.json
        shell: bash

      - name: Container gates (Windows)
        if: runner.os == 'Windows'
        run: |
          if (-not (Test-Path 'artifacts/preview_ffprobe.json')) {
            Write-Error 'Expected artifacts/preview_ffprobe.json to exist.'
          }
        shell: pwsh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-${{ matrix.os }}-${{ github.run_number }}
          path: |
            artifacts/**
            out/preview_with_audio.mp4
          retention-days: 7

      - name: Upload real-input smoke coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-input-smoke-coverage-${{ matrix.os }}
          path: artifacts/real-input-smoke-coverage.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload real-input CLI smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-input-cli-smoke-${{ matrix.os }}
          path: out/real-input-cli-smoke/**
          if-no-files-found: ignore
          retention-days: 14

  phase-e-governance:
    name: Phase E Governance (E1 Ingestion + E2 Storyboard)
    runs-on: ${{ matrix.os }}
    needs: []
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # --- Checkout -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --- Node -----------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      # --- Prepare directories -------------------------------------------
      - name: Create fixture dirs
        run: |
          mkdir -p tests/fixtures/ingestion
          mkdir -p tests/fixtures/storyboard
        shell: bash

      # --- Run Phase E1: Ingestion ---------------------------------------
      - name: Run ingestion sample
        run: |
          node --experimental-specifier-resolution=node scripts/ingest-sample.js \
            --pdf tests/fixtures/ingestion/rulebook-good.json \
            --bgg tests/fixtures/ingestion/bgg-hanamikoji.json \
            --out tests/fixtures/ingestion/sample_ingestion.json \
            --storyboard-out tests/fixtures/storyboard/sample_storyboard.json
        shell: bash

      # --- Validate E1 ingestion -----------------------------------------
      - name: Validate ingestion (E1)
        run: |
          mkdir -p out/junit
          node scripts/check_ingestion.cjs \
            --input tests/fixtures/ingestion/sample_ingestion.json \
            --contract docs/spec/ingestion_contract.json \
            --junit out/junit/ingestion-contract-${{ matrix.os }}.xml
        shell: bash

      # --- Validate E2 storyboard ----------------------------------------
      - name: Validate storyboard (E3)
        run: |
          mkdir -p out/junit
          node scripts/check_storyboard.cjs \
            --input tests/fixtures/storyboard/sample_storyboard.json \
            --contract docs/spec/storyboard_contract_v1.1.0.json \
            --junit out/junit/storyboard-contract-${{ matrix.os }}.xml
        shell: bash

      # --- Upload Artifacts ----------------------------------------------
      - name: Upload Phase E JUnit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-e-junit-${{ matrix.os }}
          path: |
            out/junit/ingestion-contract-${{ matrix.os }}.xml
            out/junit/storyboard-contract-${{ matrix.os }}.xml
            out/junit/storyboard-scenes-contract.xml
            out/junit/storyboard-motion-contract.xml
            out/junit/storyboard-layout-contract.xml
            out/junit/storyboard-timing-contract.xml
          retention-days: 7

  subtitle-governance:
    uses: ./.github/workflows/phase-f7-subtitle-governance.yml

  audio-mixing-governance:
    uses: ./.github/workflows/phase-f8-audio-mixing-governance.yml

  motion-governance:
    uses: ./.github/workflows/phase-f9-motion-governance.yml

  g3-visualization-governance:
    name: G3 Tutorial Visualization Governance
    runs-on: ${{ matrix.os }}
    needs:
      - phase-e-governance
      - subtitle-governance
      - audio-mixing-governance
      - motion-governance
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
        shell: bash

      - name: Run G3 visualization checks
        run: |
          mkdir -p artifacts/junit
          python scripts/check_g3_visualization.py tests/fixtures/g3/sample_g3_bundle.json --junit-out artifacts/junit/g3_visualization.xml
          pytest tests/test_g3_visualization_*.py
        shell: bash

  g5-cross-tutorial-analytics-governance:
    uses: ./.github/workflows/phase-g5-cross-tutorial-analytics-governance.yml

  mobius-export-governance:
    needs:
      - phase-e-governance
      - subtitle-governance
      - audio-mixing-governance
      - motion-governance
    uses: ./.github/workflows/phase-g0-mobius-export-governance.yml

  mobius-e2e:
    name: MOBIUS E2E Orchestrator
    runs-on: ubuntu-latest
    needs:
      - phase-e-governance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run MOBIUS E2E orchestrator
        run: npm run mobius:e2e

      - name: Upload MOBIUS E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobius-e2e-${{ github.run_number }}
          path: |
            out/mobius-e2e/**
          retention-days: 7

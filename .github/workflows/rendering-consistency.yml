name: Rendering Consistency

on:
  pull_request:
    paths:
      - "scripts/check_rendering_consistency.cjs"
      - "scripts/**render**"
      - "src/render/**"
      - "tests/golden/**"
  push:
    paths:
      - "scripts/check_rendering_consistency.cjs"
      - "scripts/**render**"
      - "src/render/**"
      - "tests/golden/**"

jobs:
  consistency:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Print environment
        shell: bash
        run: |
          echo "OS: ${{ runner.os }}"
          ffmpeg -version || true
          node -v
          npm -v

      - name: Run rendering consistency check
        shell: bash
        run: |
          # Skip if rendering infrastructure is incomplete
          if [ ! -d "src/render" ]; then
            echo "Skipping rendering consistency: src/render/ directory not found (rendering infrastructure incomplete)"
            exit 0
          fi
          node scripts/check_rendering_consistency.cjs --game sushi-go --platform ${{ runner.os }} --output-dir consistency_out

      - name: Upload consistency artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendering-${{ runner.os }}
          path: consistency_out/**

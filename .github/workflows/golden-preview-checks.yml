name: Golden Preview Checks

on:
  pull_request:
    paths:
      - "scripts/check_golden.js"
      - "scripts/**render**"
      - "src/render/**"
      - "tests/golden/**"
  push:
    paths:
      - "scripts/check_golden.js"
      - "scripts/**render**"
      - "src/render/**"
      - "tests/golden/**"

jobs:
  check:
    name: Golden checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Install dependencies
        run: npm ci

      - name: Render deterministic Hanamikoji preview
        shell: bash
        run: |
          node scripts/render-ffmpeg.mjs \
            tests/golden/hanamikoji/render-config.json \
            assets \
            out/preview.mp4

      - name: Run golden checks with JUnit
        shell: bash
        run: |
          mkdir -p tests/golden/reports
          node scripts/check_golden.js \
            --game hanamikoji \
            --input out/preview.mp4 \
            --junit "tests/golden/reports/junit-${{ runner.os }}-hanamikoji.xml"

      - name: Upload JUnit + debug diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-reports-and-diffs-${{ matrix.os }}
          path: |
            tests/golden/**/debug/**
            tests/golden/reports/*.xml
          if-no-files-found: ignore
